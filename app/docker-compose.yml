services:
  backend:
    build:
      context: ./backend
    container_name: gruve-backend
    environment:
      - WORKSPACE_ROOT=/workspace
      - MODEL_PATH=/workspace/ag_models
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LABEL_COL=readmitted
    volumes:
      - ../:/workspace
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: gruve-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
